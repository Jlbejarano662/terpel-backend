spring:
  application:
    name: backend

  datasource:
    url: jdbc:h2:mem:terpeldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  cache:
    type: simple

server:
  port: 8080

logging:
  level:
    com.terpel.backend: DEBUG
    org.springframework.cache: TRACE
